<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fire & Water</title>
    <meta name="description" content="Fullscreen Ruffle-powered SWF player." />

    <style>
      :root {
        color-scheme: dark;
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.72);
        --glass: rgba(10, 12, 18, 0.62);
        --line: rgba(255, 255, 255, 0.16);
        --ok: #58d68d;
        --warn: #f7c948;
        --bad: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05060a;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #player {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: #05060a;
      }

      ruffle-player {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      .overlay {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        right: max(12px, env(safe-area-inset-right));
        z-index: 10;
        width: min(360px, calc(100vw - 24px));
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--glass);
        color: var(--text);
        font-size: 12px;
        line-height: 1.35;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .player-ui {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        right: max(12px, env(safe-area-inset-right));
        z-index: 11;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--glass);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .role-pill {
        min-width: 0;
        max-width: 150px;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .room-badge {
        position: fixed;
        top: 50%;
        right: max(12px, env(safe-area-inset-right));
        z-index: 12;
        width: 176px;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--glass);
        color: var(--text);
        font-size: 11px;
        line-height: 1.25;
        transform: translateY(-50%);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .room-badge span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
        text-transform: uppercase;
      }

      .room-badge strong {
        display: block;
        margin: 2px 0 7px;
        overflow: hidden;
        color: var(--text);
        font-size: 12px;
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .room-badge strong:last-child {
        margin-bottom: 0;
      }

      .status-row,
      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-row {
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        font-weight: 650;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--warn);
        flex: 0 0 auto;
      }

      .dot.connected {
        background: var(--ok);
      }

      .dot.disconnected,
      .dot.error {
        background: var(--bad);
      }

      .meta {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 3px 8px;
        margin-bottom: 10px;
        color: var(--muted);
      }

      .meta strong {
        color: var(--text);
        font-weight: 650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .setup {
        display: none;
        margin-bottom: 10px;
        padding: 8px;
        border: 1px solid rgba(247, 201, 72, 0.38);
        border-radius: 6px;
        color: #fff2bd;
        background: rgba(247, 201, 72, 0.12);
      }

      .setup.is-visible {
        display: block;
      }

      .actions {
        flex-wrap: wrap;
      }

      .button {
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .button:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .touch-controls {
        position: fixed;
        inset-inline: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 9;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 18px;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }

      .touch-cluster {
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }

      .touch-cluster.jump {
        justify-content: flex-end;
      }

      .pad-button {
        width: clamp(58px, 14vw, 76px);
        height: clamp(58px, 14vw, 76px);
        border: 1px solid var(--line);
        border-radius: 50%;
        background: rgba(15, 18, 28, 0.7);
        color: var(--text);
        font: inherit;
        font-size: clamp(22px, 6vw, 30px);
        font-weight: 750;
        line-height: 1;
        cursor: pointer;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .pad-button:active,
      .pad-button.is-active {
        background: rgba(88, 214, 141, 0.28);
      }

      .is-hidden {
        display: none;
      }
    </style>

    <script src="./ruffle-config.js?v=20260628-swf-sync-5"></script>
    <script src="./vendor/ruffle/ruffle.js?v=20260628-swf-sync-5"></script>
  </head>

  <body>
    <div id="player" aria-label="Flash game player"></div>

    <section id="playerUi" class="player-ui" aria-label="Game controls">
      <span id="compactRoleText" class="role-pill">Single player</span>
    </section>

    <aside id="roomBadge" class="room-badge" aria-label="Room status">
      <span>Room</span><strong id="roomBadgeId">loading</strong>
      <span>Status</span><strong id="roomBadgeStatus">Loading</strong>
      <span>Role</span><strong id="roomBadgeRole">Loading</strong>
      <span>Players</span><strong id="roomBadgePlayers">0/2 active</strong>
      <span>SWF</span><strong id="roomBadgeBridge">Bridge waiting</strong>
      <span>Local</span><strong id="roomBadgeLocal">-</strong>
      <span>Remote</span><strong id="roomBadgeRemote">-</strong>
    </aside>

    <section id="debugOverlay" class="overlay is-hidden" aria-label="Multiplayer debug status">
      <div class="status-row">
        <span class="status"><span id="statusDot" class="dot"></span><span id="statusText">Single player</span></span>
      </div>
      <div id="setupMessage" class="setup"></div>
      <div class="meta">
        <span>Room</span><strong id="roomText">-</strong>
        <span>Role</span><strong id="roleText">single-player</strong>
        <span>Discord</span><strong id="discordText">not detected</strong>
        <span>Players</span><strong id="playersText">-</strong>
      </div>
      <div class="actions">
        <button id="copyInviteButton" class="button" type="button">Copy invite URL</button>
        <button id="reconnectButton" class="button" type="button">Reconnect</button>
        <button id="fullscreenButton" class="button" type="button">Fullscreen</button>
      </div>
    </section>

    <div id="touchControls" class="touch-controls is-hidden" aria-label="Touch controls">
      <div class="touch-cluster move" aria-label="Movement touch controls">
        <button class="pad-button" type="button" data-control="left" aria-label="Move left">←</button>
        <button class="pad-button" type="button" data-control="right" aria-label="Move right">→</button>
      </div>
      <div class="touch-cluster jump" aria-label="Jump touch control">
        <button class="pad-button" type="button" data-control="jump" aria-label="Jump">↑</button>
      </div>
    </div>

    <script src="./app.js?v=20260628-swf-sync-5"></script>
  </body>
</html>
