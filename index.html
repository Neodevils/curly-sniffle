<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fire & Water</title>
    <meta name="description" content="Fullscreen Ruffle-powered SWF player." />

    <style>
      :root {
        color-scheme: dark;
        --text: #f4f7fb;
        --glass: rgba(10, 12, 18, 0.58);
        --line: rgba(255, 255, 255, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05060a;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #player {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: #05060a;
      }

      ruffle-player {
        width: 100%;
        height: 100%;
        display: block;
      }

      .controls {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        right: max(12px, env(safe-area-inset-right));
        z-index: 10;
        display: flex;
        gap: 8px;
      }

      .button {
        min-height: 38px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--glass);
        color: var(--text);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .button:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .hint {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 10;
        max-width: min(420px, calc(100vw - 24px));
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--glass);
        color: rgba(244, 247, 251, 0.82);
        font-size: 12px;
        line-height: 1.35;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .is-hidden {
        display: none;
      }
    </style>

    <script>
      window.RufflePlayer = window.RufflePlayer || {};
      window.RufflePlayer.config = {
        autoplay: "on",
        unmuteOverlay: "hidden",
        contextMenu: false,
        letterbox: "fullscreen",
        scale: "showAll",
        warnOnUnsupportedContent: true
      };
    </script>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>

  <body>
    <div id="player" aria-label="Flash game player"></div>

    <div class="controls">
      <button id="fullscreenButton" class="button" type="button">Fullscreen</button>
    </div>

    <div id="hint" class="hint">Fullscreen için sağ üstteki butona bas. Mobilde tarayıcı bazen tam ekran iznini kısıtlayabilir.</div>

    <script>
      const FILE_PATH = "./swf/game.swf";
      const target = document.querySelector("#player");
      const fullscreenButton = document.querySelector("#fullscreenButton");
      const hint = document.querySelector("#hint");

      async function boot() {
        const api = window.RufflePlayer?.newest?.();

        if (!api || !target) {
          console.error("Ruffle or player container was not found.");
          return;
        }

        const player = api.createPlayer();
        target.appendChild(player);

        await player.ruffle().load(FILE_PATH);
      }

      async function enterFullscreen() {
        const element = document.documentElement;

        if (document.fullscreenElement) {
          await document.exitFullscreen();
          return;
        }

        if (element.requestFullscreen) {
          await element.requestFullscreen();
        }
      }

      fullscreenButton?.addEventListener("click", () => {
        enterFullscreen().catch((error) => {
          console.error("Fullscreen failed:", error);
        });
      });

      document.addEventListener("fullscreenchange", () => {
        const isFullscreen = Boolean(document.fullscreenElement);
        fullscreenButton.textContent = isFullscreen ? "Exit" : "Fullscreen";
        hint.classList.toggle("is-hidden", isFullscreen);
      });

      setTimeout(() => {
        hint?.classList.add("is-hidden");
      }, 6000);

      boot().catch((error) => {
        console.error("Failed to load the SWF file:", error);
      });
    </script>
  </body>
</html>
